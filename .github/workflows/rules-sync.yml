name: Weekly rule sync

on:
  schedule:
    - cron: "0 3 * * 0"
      timezone: "Asia/Singapore"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: weekly-rule-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Download, normalize and deduplicate upstreams
        run: python -m rule_tools.sync_upstreams
      - name: Build profiles and run tests
        run: |
          python -m rule_tools.build_rules
          python -m unittest discover -s tests -v
          python -m rule_tools.build_rule_release
      - name: Commit auditable rule snapshot
        run: |
          git config user.name "weig-rootad-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add rules
          git diff --cached --quiet || git commit -m "rules: weekly upstream sync"
          git push
      - name: Publish data-only rule release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(cat rules/version.txt)
          gh release create "rules-$VERSION" dist/weig-rootad-rules.zip dist/RULES_SHA256SUMS \
            --title "Rules $VERSION" --notes "Automated weekly exact-domain sync. This release contains data only."
