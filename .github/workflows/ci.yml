name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Rebuild rule profiles
        run: python -m rule_tools.build_rules

      - name: Verify generated rules are committed
        run: git diff --exit-code -- rules/generated

      - name: Run unit and module tests
        run: |
          python -m unittest discover -s tests -v
          bash -n module/*.sh module/bin/rulectl module/META-INF/com/google/android/update-binary
          bash tests/runtime_module.sh

      - name: Build flashable module
        run: python -m rule_tools.build_module

      - name: Upload development artifact
        uses: actions/upload-artifact@v4
        with:
          name: weig-rootad-core-only-dev
          path: |
            dist/*.zip
            dist/SHA256SUMS
          retention-days: 14

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.6.0"
      - name: Set up Android 16 SDK
        uses: android-actions/setup-android@v4
        with:
          packages: "platform-tools platforms;android-36 build-tools;36.0.0"
      - name: Build lightweight manager APK
        run: gradle --no-daemon :app:assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: weig-rootad-manager-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14
