name: Release manager and core

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag
        required: true
        default: v0.1.0

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v5
      - name: Resolve release channel and asset names
        shell: bash
        run: |
          APP_VERSION="$(sed -n 's/^[[:space:]]*versionName = "\([^"]*\)"/\1/p' app/build.gradle | head -n 1)"
          test -n "$APP_VERSION"
          if [ "$GITHUB_EVENT_NAME" = "push" ] && [ "$GITHUB_REF_TYPE" = "branch" ]; then
            RELEASE_TAG="test-latest"
            ASSET_TAG="test"
            IS_PRERELEASE="true"
          else
            RELEASE_TAG="${{ github.event.inputs.tag || github.ref_name }}"
            ASSET_TAG="$RELEASE_TAG"
            IS_PRERELEASE="false"
          fi
          echo "APP_VERSION=$APP_VERSION" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=$RELEASE_TAG" >> "$GITHUB_ENV"
          echo "ASSET_TAG=$ASSET_TAG" >> "$GITHUB_ENV"
          echo "IS_PRERELEASE=$IS_PRERELEASE" >> "$GITHUB_ENV"
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.6.0"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: "platform-tools platforms;android-36 build-tools;36.0.0"

      - name: Restore protected Android signing key
        env:
          KEYSTORE_BASE64: ${{ secrets.ROOTAD_KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/rootad-release.jks"
      - name: Download latest verified live rules or select offline fallback
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p dist/rules-release
          RULES_ZIP=""
          if gh release download --repo "$GITHUB_REPOSITORY_OWNER/WeiG-ZeroAd-Rules" \
            --pattern "WeiG-ZeroAd-Rules.zip" --dir dist/rules-release && \
            test -f dist/rules-release/WeiG-ZeroAd-Rules.zip; then
            RULES_ZIP="dist/rules-release/WeiG-ZeroAd-Rules.zip"
          else
            rm -f dist/rules-release/WeiG-ZeroAd-Rules.zip
            echo "::warning title=Rules release unavailable::Using the bundled Wei.G 20260723 base rules."
          fi
          echo "RULES_ZIP=$RULES_ZIP" >> "$GITHUB_ENV"
      - name: Build signed APK, recommended package, and core-only package
        env:
          ROOTAD_KEYSTORE_FILE: ${{ runner.temp }}/rootad-release.jks
          ROOTAD_KEYSTORE_PASSWORD: ${{ secrets.ROOTAD_KEYSTORE_PASSWORD }}
          ROOTAD_KEY_ALIAS: ${{ secrets.ROOTAD_KEY_ALIAS }}
          ROOTAD_KEY_PASSWORD: ${{ secrets.ROOTAD_KEY_PASSWORD }}
        run: |
          gradle --no-daemon :app:assembleRelease
          APKSIGNER="${ANDROID_SDK_ROOT:-$ANDROID_HOME}/build-tools/36.0.0/apksigner"
          test -x "$APKSIGNER"
          "$APKSIGNER" verify --verbose app/build/outputs/apk/release/app-release.apk
          python -m rule_tools.build_rules
          python -m unittest discover -s tests -v
          APK="dist/WeiG-ZeroAd-Manager-${ASSET_TAG}.apk"
          PACKAGE="dist/WeiG-ZeroAd-${ASSET_TAG}.zip"
          CORE="dist/WeiG-ZeroAd-${ASSET_TAG}-core-only.zip"
          mkdir -p dist
          cp app/build/outputs/apk/release/app-release.apk "$APK"
          RULE_ARGS=(--allow-rules-fallback)
          if [ -n "${RULES_ZIP:-}" ]; then
            RULE_ARGS+=(--rules-zip "$RULES_ZIP")
          fi
          python -m rule_tools.build_module --output "$CORE" \
            "${RULE_ARGS[@]}"
          python -m rule_tools.build_module --output "$PACKAGE" --manager-apk "$APK" \
            "${RULE_ARGS[@]}"
          sha256sum "$PACKAGE" "$CORE" "$APK" > dist/RELEASE_SHA256SUMS
          if [ "$IS_PRERELEASE" = "true" ]; then
            sed -e "s/{{VERSION}}/$APP_VERSION/g" -e "s/{{RUN_NUMBER}}/$GITHUB_RUN_NUMBER/g" \
              .github/TEST_RELEASE_NOTES.md > dist/RELEASE_NOTES.md
          else
            sed "s/{{TAG}}/$RELEASE_TAG/g" .github/RELEASE_NOTES.md > dist/RELEASE_NOTES.md
          fi
          echo "APK=$APK" >> "$GITHUB_ENV"
          echo "PACKAGE=$PACKAGE" >> "$GITHUB_ENV"
          echo "CORE=$CORE" >> "$GITHUB_ENV"
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "$IS_PRERELEASE" = "true" ]; then
            if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
              gh api --method PATCH "repos/$GITHUB_REPOSITORY/git/refs/tags/$RELEASE_TAG" \
                -f sha="$GITHUB_SHA" -F force=true >/dev/null
              gh release upload "$RELEASE_TAG" "$PACKAGE" "$CORE" "$APK" dist/RELEASE_SHA256SUMS --clobber
              gh release edit "$RELEASE_TAG" --prerelease \
                --notes-file dist/RELEASE_NOTES.md \
                --title "Wei.G ZeroAd Test $APP_VERSION (#$GITHUB_RUN_NUMBER)"
            else
              gh release create "$RELEASE_TAG" "$PACKAGE" "$CORE" "$APK" dist/RELEASE_SHA256SUMS \
                --target "$GITHUB_SHA" --prerelease \
                --notes-file dist/RELEASE_NOTES.md \
                --title "Wei.G ZeroAd Test $APP_VERSION (#$GITHUB_RUN_NUMBER)"
            fi
          else
            gh release create "$RELEASE_TAG" "$PACKAGE" "$CORE" "$APK" dist/RELEASE_SHA256SUMS \
              --notes-file dist/RELEASE_NOTES.md --title "Wei.G ZeroAd $RELEASE_TAG"
          fi
